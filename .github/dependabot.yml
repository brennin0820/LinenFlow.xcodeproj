version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - '*'

  - package-ecosystem: gradle
    directory: /android
    schedule:
      interval: weekly
    groups:
      android-dependencies:
        patterns:
          - '*'

  - package-ecosystem: swift
    directory: /
    schedule:
      interval: weekly
    groups:
      swift-packages:
        patterns:
          - '*'
