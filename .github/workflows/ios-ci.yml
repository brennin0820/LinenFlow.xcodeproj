name: iOS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test (HimmerFlow)
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project LinenFlow.xcodeproj \
            -scheme HimmerFlow

      - name: Select iOS Simulator
        id: simulator
        run: |
          set -euo pipefail

          extract_udid() {
            sed -E 's/^[[:space:]]+.*\(([A-F0-9-]+)\).*/\1/'
          }

          find_simulator_by_name() {
            local name="$1"
            xcrun simctl list devices available \
              | grep -F "    ${name} (" \
              | head -1 \
              | extract_udid
          }

          find_any_iphone_simulator() {
            xcrun simctl list devices available \
              | grep -E '^[[:space:]]+iPhone ' \
              | grep -v unavailable \
              | head -1 \
              | extract_udid
          }

          echo "Available iOS simulators:"
          xcrun simctl list devices available | grep -E '^-- iOS|^[[:space:]]+iPhone ' || true

          PREFERRED_NAMES=(
            "iPhone 17 Pro Max"
            "iPhone 16"
            "iPhone 17"
            "iPhone 15"
            "iPhone 16 Pro"
            "iPhone 17 Pro"
            "iPhone 15 Pro"
            "iPhone SE (3rd generation)"
          )

          SIMULATOR_ID=""
          SIMULATOR_NAME=""

          for name in "${PREFERRED_NAMES[@]}"; do
            candidate="$(find_simulator_by_name "$name" || true)"
            if [ -n "$candidate" ]; then
              SIMULATOR_ID="$candidate"
              SIMULATOR_NAME="$name"
              break
            fi
          done

          if [ -z "$SIMULATOR_ID" ]; then
            SIMULATOR_ID="$(find_any_iphone_simulator || true)"
            SIMULATOR_NAME="first available iPhone"
          fi

          if [ -z "$SIMULATOR_ID" ]; then
            echo "No iPhone simulator found" >&2
            xcrun simctl list devices available
            exit 1
          fi

          echo "Selected simulator: ${SIMULATOR_NAME} (${SIMULATOR_ID})"
          xcrun simctl boot "$SIMULATOR_ID" 2>/dev/null || true
          xcrun simctl bootstatus "$SIMULATOR_ID" -b

          echo "id=$SIMULATOR_ID" >> "$GITHUB_OUTPUT"
          echo "name=$SIMULATOR_NAME" >> "$GITHUB_OUTPUT"

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -project LinenFlow.xcodeproj \
            -scheme HimmerFlow \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.id }}" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO \
            

      - name: Test
        run: |
          set -o pipefail
          xcodebuild test \
            -project LinenFlow.xcodeproj \
            -scheme HimmerFlow \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.id }}" \
            -configuration Debug \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO \
            

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ios-test-results
          path: TestResults.xcresult
          if-no-files-found: ignore
