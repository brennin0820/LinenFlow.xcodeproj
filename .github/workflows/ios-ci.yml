name: iOS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test (HimmerFlow)
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project LinenFlow.xcodeproj \
            -scheme HimmerFlow

      - name: Select iOS Simulator
        id: simulator
        run: |
          SIMULATOR_ID=$(xcodebuild \
            -project LinenFlow.xcodeproj \
            -scheme HimmerFlow \
            -showdestinations 2>/dev/null \
            | grep "platform:iOS Simulator" \
            | grep -v placeholder \
            | grep "iPhone" \
            | head -1 \
            | sed -n 's/.*id:\([^,]*\).*/\1/p')
          if [ -z "$SIMULATOR_ID" ]; then
            echo "No iPhone simulator found" >&2
            xcodebuild -project LinenFlow.xcodeproj -scheme HimmerFlow -showdestinations
            exit 1
          fi
          echo "Using simulator: $SIMULATOR_ID"
          echo "id=$SIMULATOR_ID" >> "$GITHUB_OUTPUT"

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -project LinenFlow.xcodeproj \
            -scheme HimmerFlow \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.id }}" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO \
            

      - name: Test
        run: |
          set -o pipefail
          xcodebuild test \
            -project LinenFlow.xcodeproj \
            -scheme HimmerFlow \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.id }}" \
            -configuration Debug \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO \
            

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results
          path: TestResults.xcresult
          if-no-files-found: ignore
