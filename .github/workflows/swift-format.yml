name: Swift Format

on:
  push:
    branches: [main]
    paths:
      - 'LinenFlow/**'
      - 'LinenFlowTests/**'
      - 'LinenFlow Widget/**'
      - 'LinenFlowWidgets/**'
      - '.github/workflows/swift-format.yml'
  pull_request:
    branches: [main]
    paths:
      - 'LinenFlow/**'
      - 'LinenFlowTests/**'
      - 'LinenFlow Widget/**'
      - 'LinenFlowWidgets/**'
      - '.github/workflows/swift-format.yml'
  workflow_dispatch:

concurrency:
  group: swift-format-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Check Swift formatting
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Verify swift-format
        run: xcrun --find swift-format

      - name: Check formatting
        run: |
          CONFIG=".vscode/.swift-format"
          if [ ! -f "$CONFIG" ]; then
            echo "Missing $CONFIG" >&2
            exit 1
          fi

          FAILED=0
          while IFS= read -r -d '' file; do
            if ! xcrun swift-format lint --configuration "$CONFIG" "$file"; then
              FAILED=1
            fi
          done < <(find LinenFlow LinenFlowTests "LinenFlow Widget" LinenFlowWidgets \
            -name '*.swift' -print0)

          exit "$FAILED"
