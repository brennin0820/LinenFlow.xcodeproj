# LinenFlow / HimmerFlow — NightRaven Core build runner
# Human plan: Docs/BUILD_PLAN_FULL.md
# Orchestrator: .claude/skills/nightraven/SKILL.md (God's Eye + NightRaven = "Grav Nightraven")
#
# Usage (Cursor agent chat):
#   /nightraven Execute LinenFlow per Docs/nightraven/LINENFLOW_BUILD_RUNNER.yaml — build entire thing
# Or:
#   Read AGENTS.md and Docs/BUILD_PLAN_FULL.md. Run NightRaven Phase 0, then execute every phase
#   where status is pending or partial, in order. User approval: "build the entire thing".

project:
  id: linenflow-himmerflow
  name: LinenFlow
  workspace: /Users/brentlenninorlanda/Developer/crazyboy
  scheme: HimmerFlow
  xcodeproj: LinenFlow.xcodeproj
  android_dir: android
  complexity_full_build: CRITICAL

orchestration:
  memory: docs/14_SESSION_HANDOFF.md
  overlay: docs/GODS_EYE_REPO_OVERLAY.md
  coordination: AGENT_WORK_LOG.md
  build_ledger: docs/ledgers/BUILD_LEDGER.md
  audit_ledger: docs/ledgers/AUDIT_LEDGER.md
  divisions_full_build:
    - Planning
    - Builder
    - Architecture Auditor
    - Security Auditor
    - Performance Auditor
    - General Auditor
  ship_signal: "build the entire thing" # or "code it" per phase

current_phase: "17"

verification_defaults:
  ios_build: |
    xcodebuild -project LinenFlow.xcodeproj -scheme HimmerFlow \
      -destination 'platform=iOS Simulator,name=iPhone 17 Pro Max' build
  ios_test: |
    xcodebuild -project LinenFlow.xcodeproj -scheme HimmerFlow \
      -destination 'platform=iOS Simulator,name=iPhone 17 Pro Max' test
  android_build: |
    cd android && ./gradlew assembleDebug
  manual_qa: Docs/LinenTabManualQA.md

phases:
  - id: "0"
    name: Environment and NightRaven wiring
    status: done
    track: meta
    plan_section: "Phase 0"
    nightraven_prompt: "/nightraven Phase 0 — verify God's Eye + NightRaven install; no code unless missing"
    acceptance:
      - .cursor/rules/gods-eye-context-intent.mdc exists
      - .claude/skills/nightraven/SKILL.md exists
      - docs/ledgers/BUILD_LEDGER.md exists
      - AGENT_WORK_LOG.md claim protocol documented

  - id: "1"
    name: Xcode project for iOS
    status: done
    track: A
    plan_section: "Phase 1"
    files:
      - LinenFlow.xcodeproj/project.pbxproj
    acceptance:
      - ios_build succeeds

  - id: "2"
    name: App foundation and navigation shell
    status: done
    track: A
    plan_section: "Phase 2"
